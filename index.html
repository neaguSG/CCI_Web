<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sistem Comunicații</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background-color: #161b22; border: 2px solid #1f6feb; padding: 30px; border-radius: 8px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #238636; color: white; border: none; font-weight: bold; cursor: pointer; }
        #err { color: #f85149; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>CONEXIUNE MILITARĂ</h2>
        <form onsubmit="event.preventDefault(); validare();">
            <input type="text" id="user" placeholder="Operator" required>
            <input type="password" id="pass" placeholder="Cheie" required>
            <button type="submit">ACCES</button>
        </form>
        <div id="err">Credențiale Invalide!</div>
    </div>

    <script>
        function validare() {
            var u = document.getElementById("user").value;
            var p = document.getElementById("pass").value;
            
            if ((u === "admin" && p === "admin0111") || (u === "user" && p === "user123")) {
                window.location.href = "pagina.html";
            } else {
                document.getElementById("err").style.display = "block";
            }
        }
    </script>
</body>
</html>
